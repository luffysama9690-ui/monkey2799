<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAKURA Game Shop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body {
font-family: Arial, sans-serif;
background-color: #1a1a2e;
color: white;
text-align: center;
padding: 20px;
}
/* ကုန်ပစ္စည်း ကတ်ပြားပုံစံ ဒီဇိုင်း */
.card {
background-color: #162447;
padding: 15px;
border-radius: 10px;
margin: 15px auto;
max-width: 300px;
box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
}
/* ဝယ်ယူမည် ခလုတ်ဒီဇိုင်း */
.buy-btn {
background-color: #e43f5a;
color: white;
border: none;
padding: 10px 20px;
border-radius: 5px;
cursor: pointer;
font-weight: bold;
width: 100%;
margin-top: 10px;
}
.buy-btn:hover {
background-color: #ff4a6b;
}
</style>
</head>
<body>

<h1>🐒 Monkey Store 🐒</h1>
<p>Mobile Legends Diamonds Top-Up</p>

<div class="card">
    <h3>💎 11 Diamonds</h3>
    <p>Price: 900 MMK</p>
    <button class="buy-btn" onclick="buyDiamonds('11 Diamonds', '900 MMK')">ဝယ်ယူမည်</button>
</div>

<div class="card">
    <h3>💎 22 Diamonds</h3>
    <p>Price: 1700 MMK</p>
    <button class="buy-btn" onclick="buyDiamonds('22 Diamonds', '1700 MMK')">ဝယ်ယူမည်</button>
</div>

<div class="card">
    <h3>💎 33 Diamonds</h3>
    <p>Price: 2600 MMK</p>
    <button class="buy-btn" onclick="buyDiamonds('33 Diamonds', '2600 MMK')">ဝယ်ယူမည်</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// ဝယ်ယူတဲ့အခါ ဘယ်ပစ္စည်းလဲဆိုတာ ခွဲခြားသိအောင် ပြင်ဆင်ထားတဲ့ စနစ်
function buyDiamonds(diamondName, price) {
    tg.showPopup({
        title: 'Order တင်ရန် အတည်ပြုပါ',
        message: diamondName + ' ကို ' + price + ' ဖြင့် ဝယ်ယူရန် သေချာပါသလား?',
        buttons: [{type: 'ok', text: 'ဝယ်ယူမည်'}, {type: 'cancel', text: 'မဝယ်တော့ပါ'}]
    });
}
</script>
</body>
</html>

    <h3> 💎 44 Diamonds</h3>

</div>
