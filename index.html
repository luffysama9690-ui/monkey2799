<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let selectedProduct = "";
    let selectedPrice = "";

    // ၁။ စာမျက်နှာ အကူးအပြောင်း လုပ်ဆောင်ချက် (ဒါလေး ပြန်ထည့်ပေးထားပါတယ်)
    function switchPage(pageId, element) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
      
      document.getElementById(pageId).classList.add('active-page');
      element.classList.add('active');
    }

    // ၂။ ဖြည့်စွက်ရမည့် Form ကို ဖွင့်ခြင်း
    function openOrderModal(product, price) {
      selectedProduct = product;
      selectedPrice = price;
      document.getElementById('modalProductTitle').innerText = product + " - " + price;
      document.getElementById('orderModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('orderModal').style.display = 'none';
    }

    // ၃။ ManyChat နှင့် ကွက်တိချိတ်ဆက်မိစေရန် ပြင်ဆင်ထားသော စနစ်
    function submitOrder() {
      const gId = document.getElementById('gameId').value;
      const zId = document.getElementById('zoneId').value;
      const pay = document.getElementById('paymentMethod').value;

      if(!gId || !zId) {
        alert("Game ID နှင့် Zone ID ကို ပြည့်စုံစွာ ဖြည့်ပေးပါခင်ဗျာ။");
        return;
      }

      // ဝဘ်ဆိုဒ်ထဲက Table ထဲမှာ Pending ပြသရန် ဒေတာထည့်ခြင်း
      const tbody = document.getElementById('history-table-body');
      const row = `<tr><td>${gId}(${zId})</td><td>${selectedProduct}</td><td>${selectedPrice}</td><td class="status-pending">Pending</td></tr>`;
      tbody.innerHTML += row;

      // ManyChat ဘက်က ဖတ်လို့ရအောင် စာသားပုံစံ (String) ဖြင့် သေჩာပြောင်းပြီး ပို့ခြင်း
      const orderString = `Product: ${selectedProduct}, Price: ${selectedPrice}, GameID: ${gId}, ZoneID: ${zId}, Payment: ${pay}`;
      
      tg.sendData(orderString); // ဤအမိန့်က ManyChat Trigger ကို သွားနှိုးပါလိမ့်မည်

      closeModal();
      
      // ဝယ်သူကို စာပြပြီး Mini App ကို အလိုအလျောက် ပိတ်ချလိုက်ခြင်း
      alert("Order တင်ခြင်း အောင်မြင်ပါသည်။");
      tg.close(); 
    }
  </script>
</body>
</html>
