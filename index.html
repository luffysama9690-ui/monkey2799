<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MONKEY RECHARGE</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --bg-color: #0d131a; --card-bg: #141f2e; --text-main: #ffffff; --primary: #2fa3e6; }
    body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 16px; }
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { color: var(--primary); font-size: 20px; margin: 0; }
    .section-title { font-size: 14px; color: var(--primary); margin: 15px 0 10px 0; }
    .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .input-field { background-color: var(--card-bg); border: 1px solid #23354d; border-radius: 8px; padding: 12px; color: white; text-align: center; width: 100%; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .card { background-color: var(--card-bg); border: 2px solid transparent; border-radius: 10px; padding: 12px 8px; text-align: center; cursor: pointer; }
    .card.selected { border-color: var(--primary); background-color: #172c47; }
    .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .pay-card { background-color: var(--card-bg); border: 2px solid transparent; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; }
    .pay-card.selected { border-color: var(--primary); background-color: #172c47; }
    .account-details { background-color: #1e293b; padding: 16px; border-radius: 8px; margin-top: 15px; display: none; border-left: 4px solid var(--primary); }
    .upload-box { background-color: var(--card-bg); border: 2px dashed #23354d; border-radius: 10px; padding: 30px 16px; text-align: center; cursor: pointer; margin-top: 15px; }
    .preview-img { display: none; width: 100%; max-height: 200px; object-fit: contain; margin-top: 15px; }
    .btn-submit { width: 100%; background-color: var(--primary); color: white; border: none; border-radius: 8px; padding: 14px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    .step-screen { display: none; }
    #step1 { display: block; }
    #resultScreen { display: none; text-align: center; padding: 30px 16px; background-color: var(--card-bg); border-radius: 12px; }
  </style>
</head>
<body>
  <div class="header"><h1>🐒 MONKEY RECHARGE</h1></div>
  <div id="step1" class="step-screen">
    <div class="section-title">Game ID & Zone ID</div>
    <div class="input-group">
      <input type="number" id="gameId" class="input-field" placeholder="Player ID">
      <input type="number" id="zoneId" class="input-field" placeholder="Zone ID">
    </div>
    <div class="section-title">Select Diamonds</div>
    <div class="grid">
      <div class="card" onclick="selectItem('11 Diamonds', '831', this)">11 💎<br><span style="color:var(--primary)">831 K</span></div>
      <div class="card" onclick="selectItem('22 Diamonds', '1561', this)">22 💎<br><span style="color:var(--primary)">1561 K</span></div>
      <div class="card" onclick="selectItem('86 Diamonds', '5249', this)">86 💎<br><span style="color:var(--primary)">5249 K</span></div>
    </div>
    <button class="btn-submit" onclick="goToStep(2)">Next Step</button>
  </div>
  <div id="step2" class="step-screen">
    <div class="section-title">Select Payment</div>
    <div class="payment-grid">
      <div class="pay-card" id="kpayOpt" onclick="selectPayment('KPay', '09xxxxxxxxx')">KBZPay</div>
      <div class="pay-card" id="waveOpt" onclick="selectPayment('WavePay', '09xxxxxxxxx')">WavePay</div>
    </div>
    <div id="accountBox" class="account-details">
      <b>Payment Account</b><br>
      Number: <span id="payNumber" style="color:#10b981; font-weight:bold;">-</span>
    </div>
    <button class="btn-submit" onclick="goToStep(3)">Paid (Next)</button>
    <button class="btn-submit" onclick="goToStep(1)" style="background-color: #334155;">Back</button>
  </div>
  <div id="step3" class="step-screen">
    <div class="section-title">Upload Screenshot</div>
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
      <div id="uploadText">📸 Click to upload Slip</div>
      <input type="file" id="fileInput" style="display:none;" accept="image/*" onchange="previewFile()">
      <img id="imagePreview" class="preview-img">
    </div>
    <button class="btn-submit" id="submitBtn" onclick="placeOrder()">Submit Order</button>
    <button class="btn-submit" onclick="goToStep(2)" style="background-color: #334155;">Back</button>
  </div>
  <div id="resultScreen">
    <h2 style="color:#10b981;">✓ အော်ဒါတင်ခြင်း အောင်မြင်သည်</h2>
    <p>အော်ဒါနှင့် ပြေစာကို စစ်ဆေးပြီး ၅ မိနစ်အတွင်း စိန်ထည့်သွင်းပေးပါမည်။</p>
  </div>

  <script>
    let selectedProduct = "", selectedPrice = "", selectedMethod = "", base64Image = "";
    function selectItem(p, pr, el) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected'); selectedProduct = p; selectedPrice = pr;
    }
    function selectPayment(m, acc) {
      document.getElementById('kpayOpt').classList.remove('selected');
      document.getElementById('waveOpt').classList.remove('selected');
      if(m === 'KPay') document.getElementById('kpayOpt').classList.add('selected');
      if(m === 'WavePay') document.getElementById('waveOpt').classList.add('selected');
      selectedMethod = m; document.getElementById('payNumber').innerText = acc;
      document.getElementById('accountBox').style.display = 'block';
    }
    function goToStep(s) {
      if(s===2 && (!document.getElementById('gameId').value || !selectedProduct)) return alert("Please fill all fields!");
      if(s===3 && !selectedMethod) return alert("Select payment method!");
      document.querySelectorAll('.step-screen').forEach(scr => scr.style.display = 'none');
      document.getElementById('step' + s).style.display = 'block';
    }
    function previewFile() {
      const file = document.getElementById('fileInput').files[0];
      const reader = new FileReader();
      reader.onloadend = function () {
        document.getElementById('imagePreview').src = reader.result;
        document.getElementById('imagePreview').style.display = 'block';
        document.getElementById('uploadText').innerText = "✓ Image Selected";
        base64Image = reader.result; 
      }
      if (file) reader.readAsDataURL(file);
    }
    async function placeOrder() {
      if(!base64Image) return alert("Please upload screenshot!");
      const btn = document.getElementById('submitBtn');
      btn.innerText = "Processing..."; btn.disabled = true;
      const url = "https://script.google.com/macros/s/AKfycbw3oGDi41GVQX1d6VGGXRQLOxxYEEdAjHVG8baqV5CbU5Jvwu88oaATTiU69Zkqckup/exec";
      try {
        await fetch(url, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            gameId: document.getElementById('gameId').value,
            zoneId: document.getElementById('zoneId').value,
            product: selectedProduct,
            price: selectedPrice + " K",
            paymentMethod: selectedMethod,
            screenshot: base64Image
          })
        });
        document.getElementById('step3').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
      } catch (e) {
        document.getElementById('step3').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
      }
    }
  </script>
</body>
</html>
