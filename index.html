<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>MONKEY RECHARGE</title>
  <style>
    body { font-family: sans-serif; background-color: #0d131a; color: white; padding: 20px; }
    .input-field { background-color: #141f2e; border: 1px solid #23354d; color: white; padding: 10px; width: 100%; margin-bottom: 10px; border-radius: 5px; }
    button { background-color: #2fa3e6; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🐒 MONKEY RECHARGE</h1>
  <input type="number" id="gameId" class="input-field" placeholder="Player ID">
  <input type="number" id="zoneId" class="input-field" placeholder="Zone ID">
  <input type="text" id="product" class="input-field" placeholder="Product Name">
  <input type="text" id="price" class="input-field" placeholder="Price">
  <button onclick="placeOrder()">Submit Order</button>

  <script>
    async function placeOrder() {
      const orderData = {
        gameId: document.getElementById('gameId').value,
        zoneId: document.getElementById('zoneId').value,
        product: document.getElementById('product').value,
        price: document.getElementById('price').value,
        paymentMethod: "KPay",
        screenshot: "none"
      };
      
      // ⚠️ ဒီနေရာမှာ URL အသစ်ကို ထည့်ပါ
      const url = "https://script.google.com/macros/s/AKfycbzcOozPuufaz-eqThc6wGZ-SlRtc3L1E_JT8Q2TZIBe5hGtM6UpRiFW8qAmUD3GAgYG/exec"; 

      try {
        await fetch(url, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(orderData)
        });
        alert("Success!");
      } catch(e) {
        alert("Sent!");
      }
    }
  </script>
</body>
</html>
